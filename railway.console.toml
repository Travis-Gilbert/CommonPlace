# Railway deploy config for the CommonPlace console service (apps/console).
# A SECOND service from the same repo: point the Railway service's config-file
# setting at this file (the same two-services-one-repo pattern Index-API uses
# with railway.worker.toml). The web service keeps railway.toml untouched.
# pnpm resolves the workspace file: dependency (@commonplace/block-view);
# npm ci cannot, which is why this service does not reuse install:railway.

[build]
builder = "RAILPACK"
buildCommand = "npm run console:build:railway"
watchPatterns = [
  "apps/console/**",
  "packages/block-view/**",
  "packages/theorem-acp/**",
  "package.json",
  "pnpm-lock.yaml",
  "railway.console.toml"
]

# Round 2 env contract (HANDOFF-CONSOLE-ROUND-2 R2). Set on the Railway
# service; none of these ship defaults that fake liveness:
#   NEXT_PUBLIC_CONSOLE_CHAT_URL = /api/chat/stream   (unset renders the named
#     unavailable state; the route drives the hosted Theorem ACP session)
#   THEOREM_NODE_URL / THEOREM_ACP_WS_URL / THEOREM_API_TOKEN  (hosted ACP;
#     defaults resolve to https://api.theoremharness.com in production)
#   CONSOLE_COHESIVE_TURN_ROUTING = off | all | tenant-a,tenant-b
#     (off by default; exact identity-derived tenant slugs enable the routed
#     prelude flow while all other tenants retain the direct hosted ACP path)
#   CONSOLE_MOBILE_API_KEY  (optional x-api-key gate for native chat; use the
#     same value as the connected CommonPlace node's mobile API key)
#   CONSOLE_DATA_API_URL + CONSOLE_DATA_API_KEY  (object seam; the record
#     table renders its error state when unreachable, identity refused on 403)
#   CONSOLE_HARNESS_URL + CONSOLE_HARNESS_TOKEN + CONSOLE_HARNESS_TENANT +
#   CONSOLE_HARNESS_ROOM  (presence and runs; absent keeps presence hidden
#     and the Runs scope in its named unavailable state)

[deploy]
startCommand = "npm run console:start:railway"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
