# Railway deploy config for the CommonPlace Next.js web service when Railway
# builds from the repository root. Keep this aligned with apps/web/railway.toml.

[build]
builder = "RAILPACK"
buildCommand = "npm run build:railway"
watchPatterns = [
  "apps/web/src/**",
  "apps/web/public/**",
  "apps/web/scripts/**",
  "apps/web/next.config.ts",
  "apps/web/package.json",
  "apps/web/package-lock.json",
  "apps/web/railway.toml",
  "package.json",
  "packages/**",
  "railpack.json",
  "railway.toml"
]

[deploy]
startCommand = "node apps/web/scripts/start-railway.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
